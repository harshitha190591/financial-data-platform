name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyspark==3.5.0 delta-spark==3.1.0 faker pytest pyyaml

      - name: Generate mock data
        run: python3 data_generator/generate_data.py

      - name: Run Bronze to Gold pipeline
        run: python3 pipelines/batch/bronze_to_gold.py

      - name: Run data quality checks
        run: python3 quality/dq_framework.py